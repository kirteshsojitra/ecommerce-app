server:
  port: 8080  # Gateway always on 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ? Auto discover routes from Eureka
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # ? Manual routes for each service
      routes:

        # User Service Route
        - id: user-service
          uri: lb://user-service        # lb = load balanced via Eureka
          predicates:
            - Path=/api/users/**        # any /api/users/ request
          filters:
            - StripPrefix=1             # removes /api from path

        # Product Service Route
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1

        # Order Service Route
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        # Payment Service Route
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

# ? Eureka connection
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ? Actuator health check
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true

# ? Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG